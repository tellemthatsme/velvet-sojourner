version: '3.8'

services:
  # API Gateway - Unified access point
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GATEWAY_PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - litellm
    networks:
      - agent-network
    restart: unless-stopped

  # LiteLLM Proxy - Universal LLM API
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - ./deployment/litellm-config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - agent-network
    restart: unless-stopped

  # Redis - Message broker and cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - agent-network
    restart: unless-stopped

  # CrewAI Agent Service
  crewai-agent:
    build:
      context: ./ai-agents/crewai
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AGENT_TYPE=crewai
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - litellm
    networks:
      - agent-network
    restart: unless-stopped

  # AutoGen Agent Service
  autogen-agent:
    build:
      context: ./ai-agents/autogen
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AGENT_TYPE=autogen
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - litellm
    networks:
      - agent-network
    restart: unless-stopped

  # MCP Server Hub
  mcp-hub:
    build:
      context: ./mcp-servers/hub
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - MCP_PORT=3001
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./mcp-servers/config:/app/servers
    depends_on:
      - redis
    networks:
      - agent-network
    restart: unless-stopped

  # Monitoring Dashboard
  dashboard:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./deployment/dashboard:/usr/share/nginx/html
    networks:
      - agent-network
    restart: unless-stopped

  # Context7 Documentation Server
  context7:
    build:
      context: ./mcp-servers/context7
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DATA_DIR=/data
    volumes:
      - context7-data:/data
    networks:
      - agent-network
    restart: unless-stopped

volumes:
  redis-data:
  context7-data:

networks:
  agent-network:
    driver: bridge
