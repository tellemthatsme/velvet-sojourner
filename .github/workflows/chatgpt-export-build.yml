name: ChatGPT Export Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r chatgpt-export/requirements.txt

      - name: Run tests
        working-directory: chatgpt-export
        run: python -m pytest tests/ -v

      - name: Build EXE
        working-directory: chatgpt-export
        run: pyinstaller chatgpt-export.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPTExport-windows
          path: chatgpt-export/dist/
