name: GitHub Downloader Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r github-downloader-new/requirements.txt

      - name: Run tests
        working-directory: github-downloader-new
        run: |
          if (Test-Path "tests") { python -m pytest tests -v } else { echo "No tests directory found, skipping tests" }
        shell: pwsh

      - name: Build EXE with PyInstaller
        working-directory: github-downloader-new
        run: |
          if (Test-Path "github-downloader.spec") {
            pyinstaller github-downloader.spec
          } elseif (Test-Path "GitHubDownloader.spec") {
            pyinstaller GitHubDownloader.spec
          } else {
            pyinstaller --onefile --name GitHubDownloader main.py
          }
        shell: pwsh

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GitHubDownloader-${{ matrix.os }}
          path: |
            github-downloader-new/dist/
            !github-downloader-new/dist/**/*.py
