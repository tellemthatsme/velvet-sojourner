name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
      - name: Test smoke
        run: python tests/smoke_test.py

  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build PyInstaller binary
        run: pyinstaller build_pro.spec
      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt-export-pro-linux
          path: dist/chatgpt-export-pro
      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt-export-pro-windows
          path: dist/chatgpt-export-pro.exe
      - name: Upload binary (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt-export-pro-macos
          path: dist/chatgpt-export-pro

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build distribution
        run: |
          python -m pip install build twine
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ChatGPT Export Pro ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            artifacts/chatgpt-export-pro-linux/chatgpt-export-pro
            artifacts/chatgpt-export-pro-windows/chatgpt-export-pro.exe
            artifacts/chatgpt-export-pro-macos/chatgpt-export-pro
          fail_on_unmatched_files: true
